name: Record and backup

on:
  workflow_dispatch:
    inputs:
      stream_url:
        description: 'URL profile'
        required: true

jobs:
  record-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check disk space
        id: disk
        run: |
          avail_kb=$(df --output=avail / | tail -1)
          avail_gb=$((avail_kb / 1024 / 1024))
          
          echo "avail_gb=$avail_gb" >> $GITHUB_OUTPUT
          echo "Disk available: ${avail_gb}GB"
      
      - name: Free disk space (if needed)
        if: ${{ fromJSON(steps.disk.outputs.avail_gb) < 50 }}
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Try setup-ffmpeg
        uses: FedericoCarboni/setup-ffmpeg@v3
        continue-on-error: true
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure ffmpeg is functional
        run: |
          ffmpeg -version >/dev/null 2>&1 || (
            sudo apt-get update -qq &&
            sudo apt-get install -y ffmpeg
          )
          
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright google-api-python-client google-auth-httplib2 google-auth-oauthlib
          playwright install chromium --with-deps

      - name: Run Recording Script
        env:
          STREAM_URL: ${{ github.event.inputs.stream_url }}
        run: python recorder/recorder.py

      - name: Backup video
        if: success() 
        env:
          STREAM_URL: ${{ github.event.inputs.stream_url }}
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          FOLDER_ID: ${{ secrets.FOLDER_ID }}
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
        run: python recorder/upload.py
