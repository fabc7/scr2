name: Record and backup

on:
  workflow_dispatch:
    inputs:
      stream_url:
        description: 'URL profile'
        required: true

jobs:
  record-and-upload:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true
          
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies (FFmpeg)
        uses: FedericoCarboni/setup-ffmpeg@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright google-api-python-client google-auth-httplib2 google-auth-oauthlib
          playwright install chromium --with-deps

      - name: Run Recording Script
        env:
          STREAM_URL: ${{ github.event.inputs.stream_url }}
        run: python recorder/recorder.py

      - name: Upload Video to YouTube
        if: success() 
        env:
          STREAM_URL: ${{ github.event.inputs.stream_url }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: python recorder/upload.py
